<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Level Editor</title>
<style>
body { background:#111; color:white; text-align:center; font-family:Arial; }
canvas { background:black; border:2px solid #67ffff; display:block; margin:20px auto; cursor: crosshair; }
button { margin:5px; padding:10px; cursor:pointer; background: #333; color: white; border: 1px solid #67ffff; }
button:hover { background: #67ffff; color: black; }
.active { background: #67ffff; color: black; }

/* Styling for the dangerous delete button */
#deleteLevelBtn { border-color: #ff4444; color: #ff4444; }
#deleteLevelBtn:hover { background: #ff4444; color: white; }
</style>
</head>
<body>

<h2>Level Editor</h2>

<div id="toolbar">
    <button id="blockBtn" class="active">Block</button>
    <button id="spikeBtn">Spike</button>
    <button id="jumpPadBtn">Jump Pad</button> 
    <button id="gravityBtn">Gravity Portal</button> 
    <button id="planeBtn">Plane Portal</button>
    <button id="finishBtn">Finish</button>
    <button id="deleteBtn">Eraser</button>
    
    <span style="margin: 0 15px; border-left: 1px solid #444;"></span>

    <button id="saveBtn">Save Level</button>
    <button id="loadBtn">Load Level</button>
    <button id="deleteLevelBtn">Delete Level</button>
    <button id="newBtn">New</button>
    
    <button id="publish-btn" style="background:#00ffff; color:#000; padding:10px; cursor:pointer; font-weight:bold;">
        PUBLISH LEVEL
    </button>

    <button onclick="window.location.href='index.html'">Back</button>
</div>

<p>Use <b>Arrow Keys</b> to scroll the level</p>
<canvas id="editorCanvas" width="1000" height="500"></canvas>

<script type="module" src="firebase-init.js"></script>

<script src="editor.js"></script>

</body>
</html>
